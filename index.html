<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alpha Electronics | Pune</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-950 text-slate-200">

  <header class="sticky top-0 z-40 border-b border-white/5 bg-neutral-950/80 backdrop-blur-xl">
    <div class="max-w-7xl mx-auto flex items-center justify-between px-4 py-4">
      <div class="text-white font-black text-xl">Alpha Electronics</div>
      <div class="flex gap-3">
        <button onclick="openAuthModal('login')" class="text-sm font-bold hover:text-blue-400">Login</button>
        <button onclick="openAuthModal('register')" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-blue-500">Register</button>
      </div>
    </div>
  </header>

  <div id="auth-modal" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-4">
    <div class="bg-neutral-900 w-full max-w-sm p-6 rounded-3xl border border-white/10 shadow-2xl">
      <h2 id="modal-title" class="text-xl font-bold mb-6 text-center">Login to Alpha</h2>
      
      <div class="flex gap-2 mb-6">
        <button onclick="setRole('customer')" id="role-customer" class="flex-1 py-2 rounded-xl bg-blue-600 text-xs font-bold">Customer</button>
        <button onclick="setRole('technician')" id="role-technician" class="flex-1 py-2 rounded-xl bg-neutral-800 text-xs font-bold">Technician</button>
      </div>

      <div class="space-y-3">
        <button class="w-full bg-white text-black py-3 rounded-xl font-bold hover:bg-slate-200 transition">Google Sign-In</button>
        <button class="w-full bg-neutral-800 py-3 rounded-xl font-bold hover:bg-neutral-700 transition">Continue with Email</button>
      </div>
      
      <button onclick="document.getElementById('auth-modal').classList.add('hidden')" class="w-full mt-6 text-slate-500 text-xs hover:text-white">Close</button>
    </div>
  </div>

  <section class="py-20 text-center">
    <h1 class="text-4xl font-black text-white mb-4">Service Marketplace for Pune</h1>
    <p class="text-slate-400 mb-8">Professional repairs, directly to your door.</p>
  </section>

  <footer class="py-10 text-center border-t border-white/5">
    <p class="text-xs text-slate-600">&copy; 2026 Alpha Electronics. All rights reserved.</p>
    <p class="mt-2 text-sm text-blue-500 font-bold">Shalem Chinta</p>
  </footer>

  <script>
    let currentRole = 'customer';
    
    function openAuthModal(mode) {
      document.getElementById('modal-title').innerText = mode === 'login' ? 'Login to Alpha' : 'Join as Professional';
      document.getElementById('auth-modal').classList.remove('hidden');
    }

    function setRole(role) {
      currentRole = role;
      document.getElementById('role-customer').className = role === 'customer' ? 'flex-1 py-2 rounded-xl bg-blue-600 text-xs font-bold' : 'flex-1 py-2 rounded-xl bg-neutral-800 text-xs font-bold';
      document.getElementById('role-technician').className = role === 'technician' ? 'flex-1 py-2 rounded-xl bg-blue-600 text-xs font-bold' : 'flex-1 py-2 rounded-xl bg-neutral-800 text-xs font-bold';
    }
  </script>
</body>
</html>
